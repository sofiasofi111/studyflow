<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* # форма входа и регистрации */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .auth-card {
            width: min(520px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 58px rgba(15, 23, 42, 0.08);
            padding: 38px;
        }
        .auth-card h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }
        .auth-card p {
            margin: 0 0 28px;
            color: var(--muted);
            max-width: 420px;
        }
        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-field label {
            font-size: 0.95rem;
            color: var(--muted);
        }
        .auth-field .password-wrapper {
            position: relative;
        }
        .auth-field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
        }
        .auth-field .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .auth-field .toggle-password::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .auth-field .toggle-password.active::before {
            background: var(--text);
            transform: scale(1.2);
        }
        .auth-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: flex-start;
        }
        .auth-actions button {
            flex: 1 1 150px;
            min-width: 140px;
            border: 1px solid transparent;
            background: var(--text);
            color: #ffffff;
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 700;
        }
        .auth-toggle {
            flex: 1 1 100%;
            width: 100%;
        }
        .auth-actions button:hover {
            background: #111111;
        }
        .auth-toggle {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .auth-toggle a {
            color: var(--text);
            text-decoration: underline;
            cursor: pointer;
        }
        .message {
            margin-top: 18px;
            color: var(--text);
            font-size: 0.95rem;
            min-height: 1.2em;
        }
        @media (max-width: 520px) {
            .auth-card { padding: 24px; }
            .auth-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .auth-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- # страница логина -->
    <div class="auth-card">
        <h1 id="formTitle">Увійти</h1>
        <p id="formSubtitle">Увійдіть, щоб зберегти свої завдання та синхронізувати дані.</p>

        <div class="auth-field">
            <label for="usernameInput">Ім'я користувача</label>
            <input id="usernameInput" type="text" placeholder="Ваше имя" autocomplete="username">
        </div>
        <div class="auth-field">
            <label for="passwordInput">Пароль</label>
            <div class="password-wrapper">
                <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password">
                <button type="button" class="toggle-password" onclick="togglePassword('passwordInput')" aria-label="Показати пароль"></button>
            </div>
        </div>
        <div class="auth-field" id="confirmPasswordField" style="display:none;">
            <label for="confirmPasswordInput">Підтвердіть пароль</label>
            <div class="password-wrapper">
                <input id="confirmPasswordInput" type="password" placeholder="Підтвердіть пароль" autocomplete="new-password">
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPasswordInput')" aria-label="Показати пароль"></button>
            </div>
        </div>

        <div class="auth-actions">
            <button id="submitBtn" onclick="submitForm()">Увійти</button>
            <span class="auth-toggle" id="toggleText">Немає акаунта? <a onclick="switchMode('register')">Зареєструватись</a></span>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        // # скрипт формы входа/регистрации
        const params = new URLSearchParams(window.location.search);
        let mode = params.get('action') === 'register' ? 'register' : 'login';
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const message = document.getElementById('message');
        const confirmField = document.getElementById('confirmPasswordField');

        // кодирует значение для безопасного хранения (encodeURIComponent + base64). используется для сохранения пароля в localStorage.
        function safeEncode(value) {
            return btoa(encodeURIComponent(value));
        }
        // декодирует значение, ранее закодированное через safeEncode.
        function safeDecode(value) {
            return decodeURIComponent(atob(value));
        }

        // получает объект всех пользователей из localStorage или возвращает пустой объект.
        function getUsers() {
            const stored = localStorage.getItem('plannerUsers');
            try {
                return stored ? JSON.parse(stored) : {};
            } catch (error) {
                return {};
            }
        }

        // сохраняет объект пользователей в localStorage.
        function saveUsers(users) {
            localStorage.setItem('plannerUsers', JSON.stringify(users));
        }

        // отображает сообщение пользователю в интерфейсе; при isError=false показывает успех.
        function showMessage(text, isError = true) {
            message.textContent = text;
            message.style.color = isError ? 'var(--danger)' : 'var(--primary)';
        }

        // переключает видимость пароля (показ/скрытие) для поля с указанным id.
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const button = input.parentElement.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                if (button) button.classList.add('active');
            } else {
                input.type = 'password';
                if (button) button.classList.remove('active');
            }
        }

        // переключает режим формы между 'register' и 'login', обновляет заголовки и видимость полей.
        function switchMode(newMode) {
            mode = newMode;
            const registration = mode === 'register';
            formTitle.textContent = registration ? 'Реєстрація' : 'Увійти';
            formSubtitle.textContent = registration ? 'Створіть обліковий запис, щоб зберігати плани.' : 'Увійдіть до свого акаунту.';
            submitBtn.textContent = registration ? 'Зареєструватись' : 'Увійти';
            // email field removed — email is optional and stored empty
            confirmField.style.display = registration ? 'flex' : 'none';
            toggleText.innerHTML = registration ? 'Вже є акаунт? <a onclick="switchMode(\'login\')">Увійти</a>' : 'Немає акаунта? <a onclick="switchMode(\'register\')">Зареєструватись</a>';
            message.textContent = '';
        }

        // обрабатывает отправку формы: регистрация или вход. выполняет валидацию полей, сохраняет пользователя при регистрации или выполняет вход.
        function submitForm() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput') ? document.getElementById('confirmPasswordInput').value : '';

            // Username: any non-whitespace characters (allows Cyrillic, underscores, dots, etc.)
            const userPattern = /^\S+$/;
            // Password: minimum 6 characters (any characters)
            const passPattern = /^.{6,}$/

            if (!username || !password) {
                showMessage('Заповніть імʼя користувача та пароль.');
                return;
            }

            if (!userPattern.test(username)) {
                showMessage('Імʼя користувача: не можна використовувати пробіли.');
                return;
            }

            if (!passPattern.test(password)) {
                showMessage('Пароль повинен містити не менше 6 символів.');
                return;
            }

            const users = getUsers();
            const normalizedUser = username.toLowerCase();

            if (mode === 'register') {
                if (!confirmPassword) {
                    showMessage('Підтвердження пароля обовʼязкове.');
                    return;
                }
                if (password !== confirmPassword) {
                    showMessage('Паролі не співпадають.');
                    return;
                }
                if (users[normalizedUser]) {
                    showMessage('Користувач вже існує. Оберіть інше імʼя.');
                    return;
                }
                users[normalizedUser] = {
                    username: username,
                    email: '',
                    password: safeEncode(password),
                    avatar: null,
                    banner: null
                };
                saveUsers(users);
                localStorage.setItem('plannerCurrentUser', username);
                showMessage('Реєстрація успішна! Перенаправлення...', false);
                setTimeout(() => window.location.href = 'index.html', 1200);
            } else {
                const user = users[normalizedUser];
                if (!user || safeDecode(user.password) !== password) {
                    showMessage('Невірні дані. Спробуйте ще раз.');
                    return;
                }
                localStorage.setItem('plannerCurrentUser', user.username);
                showMessage('Вхід успішний! Перенаправлення...', false);
                setTimeout(() => window.location.href = 'index.html', 900);
            }
        }

        

        switchMode(mode);
    </script>
</body>
</html>
